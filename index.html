<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GI Unit Daily Checklist</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for React/JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map for React, Lucide Icons, and Firebase -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
      }
    }
    </script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <!-- Main React Application -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
          getAuth, 
          signInAnonymously, 
          signInWithCustomToken,
          onAuthStateChanged 
        } from 'firebase/auth';
        import { 
          getFirestore, 
          collection, 
          addDoc, 
          onSnapshot, 
          query,
          doc,
          deleteDoc
        } from 'firebase/firestore';
        import { 
          LayoutDashboard,
          ListChecks,
          Activity,
          ClipboardCheck, 
          History, 
          QrCode, 
          CheckCircle2, 
          Loader2, 
          ArrowLeft,
          User,
          Clock,
          MapPin,
          ChevronRight,
          AlertCircle,
          FileText,
          CalendarDays,
          XCircle,
          Trash2,
          Lock,
          CalendarX,
          Ban
        } from 'lucide-react';

        // --- Configuration ---
        // Change this PIN to your own secret code for deletions
        const ADMIN_PIN = "X135";

        // --- Firebase Configuration ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
          apiKey: "AIza" + "SyCPzRnUIMxwB4ulifDI2I17cdIHG63IRxQ",
          authDomain: "gi-endoscopy-unit-checks.firebaseapp.com",
          projectId: "gi-endoscopy-unit-checks",
          storageBucket: "gi-endoscopy-unit-checks.firebasestorage.app",
          messagingSenderId: "1019633479439",
          appId: "1:1019633479439:web:4b53e8593f0920144b187a",
          measurementId: "G-RQDLPFV961"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gi-endoscopy-unit-checks';

        // --- Checklist Data ---
        const CHECKLIST_DATA = {
          recovery: {
            title: "Recovery Area",
            daily: [
              "Clean Nursing Station & WOWs",
              "Emergency trolley – clean and check",
              "O2/Suction ports – check and dust",
              "Crash bells",
              "Obs machines – check and dust",
              "Adm/Disch rooms clean/BP cuffs stock",
              "Clean drip stands – green sticker",
              "IV trolleys – clean surfaces and stock",
              "ECG machine – clean and charge",
              "Order sandwiches/cylinders",
              "Check patient kitchen checklist done",
              "Clean sharp bins tray and holders",
              "Deep clean bed area (bed frame, cabinet)"
            ],
            weekly: [
              "IV trolleys – full clean",
              "Gloves/Apron holder – clean inside",
              "Linen room – tidy and dust",
              "Adm/Disch clean inside cupboards and stock",
              "BM machine/box – clean both and check",
              "Hypobox – clean and check",
              "INR machine – clean and check/charge"
            ]
          },
          room1: {
            title: "Room 1",
            daily: [
              "Clean Desks and WOWs",
              "Clean O2/Suction ports",
              "Clean and check emergency trolley",
              "Check Crash bell",
              "Clean and check obs machine",
              "Check CD’s – order if needed",
              "IV/accessories trolleys – clean surface and stock",
              "Clean scope trolley",
              "Clean entonox cylinder",
              "Stack/screen – clean/restock at the end of list",
              "Clean sharps bins holders",
              "Dust X-Ray machine" // Added to Room 1
            ],
            weekly: [
              "IV trolleys – full clean – inside",
              "Stock and clean PPE trolley",
              "Accessories trolley – full clean",
              "Emergency trolley – full clean",
              "Stack/ERBE – full clean, back of units",
              "Gloves/Apron unit – clean inside",
              "Clean fridge on the inside – check expiry date",
              "Clean cupboards, inside out"
            ]
          },
          room2: {
            title: "Room 2",
            daily: [
              "Clean Desks and WOWs",
              "Clean O2/Suction ports",
              "Clean and check fridge temperature",
              "Check Crash bell",
              "Clean and check obs machine",
              "Check CD’s – order if needed",
              "IV/accessories trolleys – clean surface and stock",
              "Clean scope trolley",
              "Clean Entonox and O2 cylinder",
              "Stack/screen – clean/restock at the end of list",
              "Clean sharps bins holders"
              // Dust X-Ray machine removed from Room 2
            ],
            weekly: [
              "IV trolleys – full clean – inside",
              "Stock and clean PPE trolley",
              "Accessories trolley – full clean",
              "Emergency trolley – full clean",
              "Stack/ERBE – full clean, back of units",
              "Gloves/Apron unit – clean inside",
              "Clean fridge on the inside – check expiry dates",
              "Clean cupboards, inside out"
            ]
          },
          kitchen: {
            title: "Patient Kitchen",
            daily: [
              "Check stock and ask NIC to order",
              "Fill tea/coffee/sugar pots",
              "Check fridge temperature",
              "Clean and dust all surfaces"
            ],
            weekly: [
              "Clean tea/coffee/sugar pots",
              "Clean fridge inside",
              "Clean inside cupboards"
            ]
          }
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [view, setView] = useState('home'); 
          const [historyTab, setHistoryTab] = useState('logs');
          const [logs, setLogs] = useState([]);
          const [loading, setLoading] = useState(true);
          const [submitting, setSubmitting] = useState(false);
          const [error, setError] = useState(null);
          const [deleteConfirmId, setDeleteConfirmId] = useState(null);
          const [pinInput, setPinInput] = useState('');

          // Form State
          const [selectedLocKey, setSelectedLocKey] = useState(null);
          const [initials, setInitials] = useState('');
          const [checklist, setChecklist] = useState({});
          const [comment, setComment] = useState('');
          const [appUrl, setAppUrl] = useState(window.location.href);
          const [selectedUnit, setSelectedUnit] = useState('Lady Sobell');
          const [closureDate, setClosureDate] = useState(new Date().toISOString().split('T')[0]);
          const [closureReason, setClosureReason] = useState('');
          const [isRoomClosed, setIsRoomClosed] = useState(false);
          const [auditDate, setAuditDate] = useState(new Date().toISOString().split('T')[0]);

          // --- Auth Setup ---
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (err) {
                console.error("Auth error:", err);
                setError("Failed to authenticate. Please check Firebase Auth settings.");
              }
            };

            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => {
              setUser(u);
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          // --- Data Fetching ---
          useEffect(() => {
            if (!user) return;
            const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'checklist_logs');
            const q = query(logsRef);
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              const sortedData = data.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
              setLogs(sortedData);
            }, (err) => {
              console.error("Firestore error:", err);
              setError("Could not load history: " + err.message);
            });
            return () => unsubscribe();
          }, [user]);

          // --- Helpers ---
          const currentLogs = logs.filter(log => log.unit === selectedUnit || (!log.unit && selectedUnit === 'Lady Sobell'));

          const isSameDay = (d1, d2) => {
            return d1.getFullYear() === d2.getFullYear() && 
                   d1.getMonth() === d2.getMonth() && 
                   d1.getDate() === d2.getDate();
          };

          const todayLogs = currentLogs.filter(log => isSameDay(log.timestamp?.toDate ? log.timestamp.toDate() : new Date(log.timestamp), new Date()));
          const isUnitClosedToday = todayLogs.some(log => log.type === 'unit_closure');

          const last7Days = Array.from({length: 7}, (_, i) => {
            const d = new Date();
            d.setDate(d.getDate() - i);
            return d;
          });

          // Dynamic Task Fetching (allows filtering based on selected Unit)
          const getDailyTasks = (locKey, unit) => {
            let tasks = CHECKLIST_DATA[locKey].daily;
            // X-Ray machine is strictly for Lady Sobell Room 1
            if (locKey === 'room1' && unit !== 'Lady Sobell') {
              tasks = tasks.filter(task => task !== 'Dust X-Ray machine');
            }
            return tasks;
          };

          const getWeeklyTasks = (locKey) => {
            return CHECKLIST_DATA[locKey].weekly;
          };

          // --- Handlers ---
          const startChecklist = (key) => {
            const initialChecklist = {};
            getDailyTasks(key, selectedUnit).forEach(item => initialChecklist[`daily_${item}`] = false);
            getWeeklyTasks(key).forEach(item => initialChecklist[`weekly_${item}`] = false);
            
            setSelectedLocKey(key);
            setChecklist(initialChecklist);
            setComment('');
            setIsRoomClosed(false); // Reset the toggle
            setAuditDate(new Date().toISOString().split('T')[0]); // Reset date to today
            setView('check');
          };

          const handleToggle = (itemKey) => {
            setChecklist(prev => ({ ...prev, [itemKey]: !prev[itemKey] }));
          };

          const handleDelete = async (logId) => {
            if (pinInput !== ADMIN_PIN) {
              setError("Invalid Admin PIN. Deletion cancelled.");
              setPinInput('');
              return;
            }

            try {
              const logRef = doc(db, 'artifacts', appId, 'public', 'data', 'checklist_logs', logId);
              await deleteDoc(logRef);
              setDeleteConfirmId(null);
              setPinInput('');
              setError(null);
            } catch (err) {
              console.error("Delete error:", err);
              setError("Failed to delete entry. Check permissions.");
            }
          };

          const handleSubmit = async (e) => {
            e.preventDefault();
            if (!initials.trim()) return;
            
            setSubmitting(true);
            setError(null);

            try {
              const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'checklist_logs');
              
              // Parse the selected audit date
              const [year, month, day] = auditDate.split('-');
              const targetTimestamp = new Date();
              targetTimestamp.setFullYear(parseInt(year), parseInt(month) - 1, parseInt(day));
              
              // If past date, set time to noon to avoid timezone shifting
              const isToday = auditDate === new Date().toISOString().split('T')[0];
              if (!isToday) {
                targetTimestamp.setHours(12, 0, 0, 0);
              }
              
              const payload = {
                initials: initials.toUpperCase(),
                locationKey: selectedLocKey,
                locationTitle: CHECKLIST_DATA[selectedLocKey].title,
                unit: selectedUnit,
                comment: comment.trim(),
                timestamp: targetTimestamp,
                userId: user.uid,
                isLateEntry: !isToday
              };

              if (isRoomClosed) {
                payload.type = 'room_closure';
              } else {
                payload.checklist = checklist;
              }

              await addDoc(logsRef, payload);

              setInitials('');
              setComment('');
              setHistoryTab('compliance');
              setView('history');
            } catch (err) {
              console.error("Submission error:", err);
              setError("Failed to save checklist.");
            } finally {
              setSubmitting(false);
            }
          };

          const handleClosureSubmit = async (e) => {
            e.preventDefault();
            if (!initials.trim()) return;
            
            setSubmitting(true);
            setError(null);

            try {
              // Parse the selected date and set it to Noon to avoid timezone date shifts
              const [year, month, day] = closureDate.split('-');
              const targetTimestamp = new Date(year, month - 1, day, 12, 0, 0);
              const isToday = closureDate === new Date().toISOString().split('T')[0];

              const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'checklist_logs');
              await addDoc(logsRef, {
                type: 'unit_closure',
                initials: initials.toUpperCase(),
                unit: selectedUnit,
                comment: closureReason.trim(),
                timestamp: targetTimestamp,
                userId: user.uid,
                isLateEntry: !isToday
              });

              setInitials('');
              setClosureReason('');
              setClosureDate(new Date().toISOString().split('T')[0]);
              setHistoryTab('logs');
              setView('history');
            } catch (err) {
              console.error("Submission error:", err);
              setError("Failed to record unit closure.");
            } finally {
              setSubmitting(false);
            }
          };

          const formatDate = (timestamp) => {
            if (!timestamp) return "";
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
          };

          const exportToPDF = () => {
            if (currentLogs.length === 0) return;

            const printWindow = window.open('', '_blank');
            if (!printWindow) {
              setError("Please allow pop-ups to generate the PDF report.");
              return;
            }

            let complianceHtml = `
              <div style="margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px;">
                <h2 style="color: #334155; font-size: 16px; margin-bottom: 15px; font-family: sans-serif;">7-Day Compliance Summary (${selectedUnit})</h2>
                <table style="width: 100%; border-collapse: collapse; font-size: 12px; font-family: sans-serif;">
                  <thead>
                    <tr>
                      <th style="width: 25%; text-align: left; padding: 10px; border-bottom: 2px solid #cbd5e1; color: #475569;">Location</th>
            `;
            last7Days.reverse().forEach(d => {
              complianceHtml += `<th style="text-align: center; padding: 10px; border-bottom: 2px solid #cbd5e1; color: #475569;">${d.toLocaleDateString(undefined, {weekday: 'short', month: 'short', day: 'numeric'})}</th>`;
            });
            complianceHtml += `</tr></thead><tbody>`;

            Object.entries(CHECKLIST_DATA).forEach(([locKey, locData]) => {
              complianceHtml += `<tr><td style="padding: 10px; border-bottom: 1px solid #e2e8f0;"><strong>${locData.title}</strong></td>`;
              last7Days.forEach(d => {
                const closureLog = currentLogs.find(log => {
                  const logDate = log.timestamp?.toDate ? log.timestamp.toDate() : new Date(log.timestamp);
                  return (log.type === 'unit_closure' || (log.type === 'room_closure' && log.locationKey === locKey)) && isSameDay(logDate, d);
                });

                if (closureLog) {
                  complianceHtml += `<td style="color: #64748b; font-size: 11px; text-align: center; padding: 10px; border-bottom: 1px solid #e2e8f0; background-color: #f8fafc;">Closed</td>`;
                  return;
                }

                const hasLog = currentLogs.some(log => {
                  const logDate = log.timestamp?.toDate ? log.timestamp.toDate() : new Date(log.timestamp);
                  return log.type !== 'unit_closure' && log.type !== 'room_closure' && isSameDay(logDate, d) && log.locationKey === locKey;
                });
                
                if (hasLog) {
                  complianceHtml += `<td style="color: #15803d; font-weight: bold; text-align: center; padding: 10px; border-bottom: 1px solid #e2e8f0; background-color: #f0fdf4;">Done</td>`;
                } else {
                  complianceHtml += `<td style="color: #b91c1c; font-weight: bold; text-align: center; padding: 10px; border-bottom: 1px solid #e2e8f0; background-color: #fef2f2;">Missing</td>`;
                }
              });
              complianceHtml += `</tr>`;
            });
            last7Days.reverse(); 
            complianceHtml += `</tbody></table></div>`;


            let html = `
              <!DOCTYPE html>
              <html>
              <head>
                <title>${selectedUnit} - Audit Logs</title>
                <style>
                  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; padding: 40px; color: #1e293b; line-height: 1.5; }
                  h1 { color: #1e40af; text-align: center; margin-bottom: 5px; font-size: 26px; font-weight: 800; }
                  .subtitle { text-align: center; color: #64748b; margin-bottom: 40px; font-size: 14px; font-weight: 500; }
                  .logs-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
                  .logs-table th, .logs-table td { border-bottom: 1px solid #e2e8f0; padding: 14px 10px; text-align: left; vertical-align: top; }
                  .logs-table th { background-color: #f8fafc; color: #475569; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; border-top: 2px solid #cbd5e1; border-bottom: 2px solid #cbd5e1; }
                  .logs-table tr:nth-child(even) { background-color: #f8fafc; }
                  .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
                  .bg-green { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
                  .bg-red { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
                  .bg-gray { background-color: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
                  .date-cell { white-space: nowrap; width: 12%; }
                  .details-block { display: flex; flex-direction: column; gap: 6px; }
                </style>
              </head>
              <body>
                <h1>${selectedUnit} - Shift Audit Report</h1>
                <div class="subtitle">GI Unit Daily Checklist &bull; Generated on ${new Date().toLocaleString()}</div>
                
                ${complianceHtml}

                <h2 style="color: #334155; font-size: 18px; margin-top: 40px; margin-bottom: 5px;">Detailed Audit Logs</h2>
                <table class="logs-table">
                  <thead>
                    <tr>
                      <th>Date / Time</th>
                      <th style="width: 15%">Location</th>
                      <th style="width: 10%">Staff</th>
                      <th style="width: 15%">Status</th>
                      <th style="width: 48%">Details & Notes</th>
                    </tr>
                  </thead>
                  <tbody>
            `;

            currentLogs.forEach(log => {
              const dateObj = log.timestamp?.toDate ? log.timestamp.toDate() : new Date(log.timestamp);
              const dateStr = dateObj.toLocaleDateString();
              const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              const lateEntryHtml = log.isLateEntry ? `<div style="color: #ea580c; font-size: 9px; font-weight: bold; margin-top: 4px; text-transform: uppercase;">Late Entry</div>` : '';
              
              const commentText = log.comment ? `<em>${log.comment}</em>` : '<span style="color: #94a3b8;">None</span>';

              // Handle Unit or Room Closures
              if (log.type === 'unit_closure' || log.type === 'room_closure') {
                const isUnit = log.type === 'unit_closure';
                const statusBadge = `<span class="badge bg-gray">${isUnit ? 'Not Running' : 'Room Closed'}</span>`;
                const detailsText = log.comment ? `<strong>Reason:</strong> ${log.comment}` : '<em>No reason provided</em>';
                
                html += `
                  <tr>
                    <td class="date-cell"><strong>${dateStr}</strong><br/><span style="color: #64748b;">${timeStr}</span>${lateEntryHtml}</td>
                    <td><strong>${isUnit ? 'Entire Unit' : log.locationTitle}</strong></td>
                    <td>${log.initials}</td>
                    <td>${statusBadge}</td>
                    <td style="color: #475569;">${detailsText}</td>
                  </tr>
                `;
                return;
              }

              // Handle Standard Audits
              const dailyKeys = Object.keys(log.checklist || {}).filter(k => k.startsWith('daily_'));
              const dailyDone = dailyKeys.filter(k => log.checklist[k]).length;
              const dailyTotal = dailyKeys.length;
              const isAllDailyDone = dailyDone === dailyTotal;
              const missingDailyItems = dailyKeys.filter(k => !log.checklist[k]).map(k => k.replace('daily_', ''));

              const statusBadge = isAllDailyDone 
                ? `<span class="badge bg-green">Completed</span>`
                : `<span class="badge bg-red">Incomplete (${dailyDone}/${dailyTotal})</span>`;

              let detailsLines = [];
              
              if (!isAllDailyDone && missingDailyItems.length > 0) {
                detailsLines.push(`<div style="color: #b91c1c;"><strong>Missed Daily:</strong> ${missingDailyItems.join(', ')}</div>`);
              }

              const weeklyDoneList = Object.entries(log.checklist || {})
                .filter(([k, v]) => k.startsWith('weekly_') && v)
                .map(([k]) => k.replace('weekly_', ''));

              if (weeklyDoneList.length > 0) {
                detailsLines.push(`<div style="color: #1d4ed8;"><strong>Weekly Tasks Done:</strong> ${weeklyDoneList.join(', ')}</div>`);
              }

              if (log.comment) {
                detailsLines.push(`<div style="color: #334155;"><strong>Notes:</strong> <em>"${log.comment}"</em></div>`);
              }

              const finalDetails = detailsLines.length > 0 
                ? `<div class="details-block">${detailsLines.join('')}</div>`
                : `<span style="color: #94a3b8; font-style: italic;">Standard tasks completed. No notes.</span>`;

              html += `
                <tr>
                  <td class="date-cell"><strong>${dateStr}</strong><br/><span style="color: #64748b;">${timeStr}</span>${lateEntryHtml}</td>
                  <td><strong>${log.locationTitle}</strong></td>
                  <td>${log.initials}</td>
                  <td>${statusBadge}</td>
                  <td>${finalDetails}</td>
                </tr>
              `;
            });

            html += `
                  </tbody>
                </table>
                <script>
                  window.onload = () => {
                    setTimeout(() => {
                      window.print();
                    }, 250);
                  }
                <\/script>
              </body>
              </html>
            `;

            printWindow.document.write(html);
            printWindow.document.close();
          };

          const NavItem = ({ icon, label, isActive, onClick }) => (
            <button 
              onClick={onClick}
              type="button"
              className={`flex-1 flex flex-col items-center justify-center py-2 px-1 transition-all ${isActive ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}
            >
              <div className={`mb-1 transition-transform ${isActive ? 'scale-110' : ''}`}>
                {icon}
              </div>
              <span className={`text-[10px] tracking-wide ${isActive ? 'font-extrabold' : 'font-semibold'}`}>{label}</span>
            </button>
          );

          if (loading) return (
            <div className="flex items-center justify-center min-h-screen bg-gray-50">
              <Loader2 className="w-8 h-8 animate-spin text-blue-600" />
            </div>
          );

          return (
            <div className="min-h-screen bg-gray-50 font-sans text-gray-900 pb-28">
              {/* Top Header */}
              <header className="bg-blue-700 text-white sticky top-0 z-20 p-4 shadow-md">
                <div className="max-w-md mx-auto flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <Activity className="w-6 h-6 text-blue-200" />
                    <div>
                      <h1 className="font-extrabold text-lg tracking-tight leading-tight">{selectedUnit}</h1>
                      <div className="text-[10px] text-blue-200 uppercase tracking-widest font-bold">GI Unit Checklist</div>
                    </div>
                  </div>
                  {view === 'check' && (
                    <button onClick={() => setView('select-location')} className="p-2 hover:bg-blue-600 rounded-full transition-colors">
                      <ArrowLeft className="w-5 h-5" />
                    </button>
                  )}
                  {view === 'mark-closed' && (

                                  <div className="flex items-center gap-2 text-xs text-gray-500 pl-1">
                                    <User className="w-3.5 h-3.5" />
                                    <span>Staff: <strong className="text-gray-700 uppercase">{log.initials}</strong></span>
                                  </div>
                                </div>
                                <div className="flex flex-col items-end gap-1.5">
                                  <div className="text-[10px] font-bold text-gray-500 flex items-center gap-1 bg-white px-3 py-1.5 rounded-full border border-gray-200">
                                    <Clock className="w-3 h-3" />
                                    {formatDate(log.timestamp)}
                                  </div>
                                  {log.isLateEntry && (
                                    <div className="text-[9px] uppercase tracking-widest font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded-md border border-orange-200">
                                      Late Entry
                                    </div>
                                  )}
                                </div>
                              </div>
                              
                              <div className="pt-3 border-t border-gray-200 flex flex-wrap gap-2">
                                <span className="text-[10px] px-2.5 py-1 bg-gray-200 text-gray-700 rounded-lg border border-gray-300 font-extrabold uppercase tracking-wide">
                                  {isUnit ? 'Unit Not Running' : 'Room Closed'}
                                </span>
                              </div>

                              {log.comment && (
                                <div className="mt-3 p-3 bg-white rounded-2xl border border-gray-200 text-sm text-gray-600 italic">
                                  <span className="font-bold text-gray-500 not-italic block text-[10px] uppercase tracking-wider mb-1">Reason:</span>
                                  "{log.comment}"
                                </div>
                              )}
                            </div>
                          );
                        }

                        const dailyKeys = Object.keys(log.checklist || {}).filter(k => k.startsWith('daily_'));
                        const dailyDone = dailyKeys.filter(k => log.checklist[k]).length;
                        const dailyTotal = dailyKeys.length;
                        const isAllDailyDone = dailyDone === dailyTotal;
                        const missingDaily = dailyKeys.filter(k => !log.checklist[k]).map(k => k.replace('daily_', ''));

                        return (
                        <div key={log.id} className="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm space-y-4 relative group">
                          {/* DELETE ACTION WITH PIN */}
                          <div className="absolute top-4 right-4 flex flex-col items-end gap-2">
                             {deleteConfirmId === log.id ? (
                               <div className="flex flex-col gap-2 items-end bg-white p-3 rounded-2xl shadow-xl border border-gray-200 z-10 animate-in fade-in zoom-in duration-200">
                                 <div className="flex items-center gap-1.5 text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">
                                   <Lock className="w-3 h-3" /> Admin Security
                                 </div>
                                 <input 
                                   type="password"
                                   value={pinInput}
                                   onChange={(e) => setPinInput(e.target.value)}
                                   placeholder="Enter PIN"
                                   className="w-24 p-2 text-xs border border-gray-200 rounded-lg focus:border-red-500 focus:ring-1 focus:ring-red-200 transition-all text-center"
                                   autoFocus
                                 />
                                 <div className="flex gap-1.5 w-full">
                                    <button 
                                      onClick={() => {setDeleteConfirmId(null); setPinInput('');}}
                                      className="flex-1 text-[9px] font-bold text-gray-400 py-1.5 rounded-lg border border-gray-100 hover:bg-gray-50"
                                    >
                                      Cancel
                                    </button>
                                    <button 
                                      onClick={() => handleDelete(log.id)}
                                      className="flex-1 bg-red-600 text-white text-[9px] font-bold py-1.5 rounded-lg hover:bg-red-700 shadow-sm"
                                    >
                                      Delete
                                    </button>
                                 </div>
                               </div>
                             ) : (
                               <button 
                                 onClick={() => setDeleteConfirmId(log.id)}
                                 className="text-gray-300 hover:text-red-500 transition-colors p-1"
                                 title="Delete Entry"
                               >
                                 <Trash2 className="w-4 h-4" />
                               </button>
                             )}
                          </div>

                          <div className="flex justify-between items-start pr-10">
                            <div className="space-y-2">
                              <div className="flex items-center gap-2">
                                <div className="bg-blue-50 p-2 rounded-xl">
                                  <MapPin className="w-4 h-4 text-blue-600" />
                                </div>
                                <span className="font-extrabold text-gray-800">{log.locationTitle}</span>
                              </div>
                              <div className="flex items-center gap-2 text-xs text-gray-500 pl-1">
                                <User className="w-3.5 h-3.5" />
                                <span>Staff: <strong className="text-gray-700 uppercase">{log.initials}</strong></span>
                              </div>
                            </div>
                            <div className="flex flex-col items-end gap-1.5">
                              <div className="text-[10px] font-bold text-gray-500 flex items-center gap-1 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100">
                                <Clock className="w-3 h-3" />
                                {formatDate(log.timestamp)}
                              </div>
                              {log.isLateEntry && (
                                <div className="text-[9px] uppercase tracking-widest font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded-md border border-orange-200">
                                  Late Entry
                                </div>
                              )}
                            </div>
                          </div>
                          
                          <div className="pt-3 border-t border-gray-50 flex flex-wrap gap-2">
                            <span className={`text-[10px] px-2.5 py-1 rounded-lg border font-extrabold uppercase tracking-wide ${
                              isAllDailyDone ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'
                            }`}>
                              {isAllDailyDone ? 'Daily Done' : `Daily: ${dailyDone}/${dailyTotal}`}
                            </span>
                            {Object.entries(log.checklist || {}).filter(([k,v]) => k.startsWith('weekly_') && v).length > 0 && (
                              <span className="text-[10px] px-2.5 py-1 bg-blue-50 text-blue-700 rounded-lg border border-blue-200 font-extrabold uppercase tracking-wide">
                                + Weekly Tasks
                              </span>
                            )}
                          </div>

                          {!isAllDailyDone && (
                            <div className="mt-2 text-xs text-red-600 bg-red-50 p-3 rounded-2xl border border-red-100">
                              <span className="font-bold uppercase tracking-wider text-[9px] block mb-1">Missed Tasks:</span>
                              {missingDaily.join(', ')}
                            </div>
                          )}

                          {log.comment && (
                            <div className="mt-3 p-3 bg-gray-50 rounded-2xl border border-gray-100 text-sm text-gray-600 italic">
                              <span className="font-bold text-gray-500 not-italic block text-[10px] uppercase tracking-wider mb-1">Notes:</span>
                              "{log.comment}"
                            </div>
                          )}
                        </div>
                        );
                      })
                    )}
                  </div>
                )}

                {view === 'qr' && (
                  <div className="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm text-center space-y-6">
                    <h2 className="font-extrabold text-2xl text-gray-800">Post Access QR</h2>
                    <p className="text-gray-500 text-sm leading-relaxed font-medium">Print this code and place it at key unit stations for instant app access.</p>
                    
                    <div className="text-left space-y-2 bg-gray-50 p-5 rounded-2xl border border-gray-200">
                      <label className="text-xs font-extrabold text-gray-500 uppercase tracking-widest">Public App Link</label>
                      <input 
                        type="text" 
                        value={appUrl}
                        onChange={(e) => setAppUrl(e.target.value)}
                        className="w-full p-3 rounded-xl border border-gray-200 text-sm focus:border-blue-500 focus:ring focus:ring-blue-200 transition-all font-mono"
                        placeholder="https://..."
                      />
                      <p className="text-[10px] text-gray-400 font-semibold">
                        * Paste your GitHub Pages URL here to generate the correct code.
                      </p>
                    </div>

                    <div className="mx-auto w-64 h-64 bg-gray-50 border-2 border-dashed border-gray-200 rounded-3xl flex flex-col items-center justify-center p-5">
                       <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                         <img 
                            src={`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(appUrl)}`} 
                            alt="App QR Code"
                            className="w-48 h-48"
                         />
                       </div>
                    </div>

                    <button 
                      onClick={() => window.print()}
                      className="w-full py-4 bg-blue-600 text-white rounded-2xl text-sm font-extrabold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all"
                    >
                      Print QR Page
                    </button>
                  </div>
                )}
              </main>

              {/* Copyright Footnote */}
              <footer className="max-w-md mx-auto px-4 pb-8 pt-4 text-center">
                <p className="text-[10px] text-gray-400 font-medium leading-relaxed">
                  &copy; {new Date().getFullYear()} Developed by Darryl James Tolentino, Junior Charge Nurse, Endoscopy Unit WPH through Gemini.
                </p>
              </footer>

              {/* Fixed Bottom Navigation */}
              <nav className="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-50 pb-safe shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)]">
                <div className="max-w-md mx-auto flex justify-between px-2 py-1">
                  <NavItem 
                    icon={<LayoutDashboard className="w-6 h-6" />} 
                    label="Home" 
                    isActive={view === 'home'} 
                    onClick={() => setView('home')} 
                  />
                  <NavItem 
                    icon={<ListChecks className="w-6 h-6" />} 
                    label="Audit" 
                    isActive={view === 'select-location' || view === 'check'} 
                    onClick={() => setView('select-location')} 
                  />
                  <NavItem 
                    icon={<CalendarDays className="w-6 h-6" />} 
                    label="Logs" 
                    isActive={view === 'history'} 
                    onClick={() => setView('history')} 
                  />
                  <NavItem 
                    icon={<QrCode className="w-6 h-6" />} 
                    label="QR" 
                    isActive={view === 'qr'} 
                    onClick={() => setView('qr')} 
                  />
                </div>
              </nav>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
